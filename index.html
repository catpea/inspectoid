<!doctype html>
<!--
  inspectoid/index.html
  ======================

  Inspectoid's entry point is intentionally small. The application shell
  lives under ./app, and the active component project is selected through
  ./.inspectoid/project.xml. The project XML and its component files are
  imported here at startup, following the Galath playground pattern.

  To run:
    python3 -m http.server 8080
    open http://localhost:8080/
-->
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inspectoid - Component Project Inspector</title>

  <link rel="stylesheet" href="./node_modules/bogan-css/product/css/components-fantasyui.min.css">
  <style>
    #mount:empty::before {
      content: "Loading Inspectoid...";
      display: block;
      padding: 2rem;
      color: #6c757d;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "galath":      "./node_modules/galath/src/index.js",
        "galath/boot": "./node_modules/galath/src/boot.js"
      }
    }
  </script>
</head>
<body>
  <div id="mount"></div>

  <script type="application/xml" id="galath-source">
    <galath version="1.0">
      <import src="./app/app.xml" />
      <import src="./.inspectoid/project.xml" />

      <application name="inspectoid">
        <x-inspectoid-app />
      </application>
    </galath>
  </script>

  <script src="./node_modules/bogan-css/product/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./node_modules/bogan-css/product/js/components.js"></script>
  <script type="module" src="./app/components/story-host.js"></script>

  <script type="module">
    import { boot } from 'galath/boot';

    try {
      const source = await sourceWithProjectImports(
        document.getElementById('galath-source').textContent,
        './.inspectoid/project.xml',
      );
      window.inspectoid = await boot({
        source,
        mount:  document.getElementById('mount'),
      });
    } catch (error) {
      const mount = document.getElementById('mount');
      mount.innerHTML = `
        <div class="container-xxl py-5">
          <div class="alert alert-danger">
            <h2 class="h5"><i class="bi bi-exclamation-triangle me-2"></i>Inspectoid failed to boot</h2>
            <pre class="mb-0">${String(error?.stack || error)}</pre>
          </div>
        </div>
      `;
      throw error;
    }

    async function sourceWithProjectImports(source, projectSrc) {
      const imports = await projectComponentImports(projectSrc);
      if (imports.length === 0) return source;

      const importXml = imports
        .map(src => `      <import src="${escapeXmlAttribute(src)}" />`)
        .join('\n');

      return source.replace(
        /(\n\s*<application\b)/,
        `\n${importXml}\n$1`,
      );
    }

    async function projectComponentImports(projectSrc) {
      const response = await fetch(projectSrc);
      if (!response.ok) {
        throw new Error(`Failed to load ${projectSrc}: HTTP ${response.status}`);
      }

      const text = await response.text();
      const projectDoc = new DOMParser().parseFromString(text, 'application/xml');
      const parseError = projectDoc.querySelector('parsererror');
      if (parseError) throw new Error(parseError.textContent.trim());

      const imports = [];
      const seen = new Set();
      const add = src => {
        if (!src || seen.has(src)) return;
        seen.add(src);
        imports.push(src);
      };

      for (const importEl of projectDoc.querySelectorAll('import[src]')) {
        add(importEl.getAttribute('src'));
      }
      for (const storyEl of projectDoc.querySelectorAll('story[file]')) {
        add(storyEl.getAttribute('file'));
      }

      window.inspectoidProjectImports = imports;
      return imports;
    }

    function escapeXmlAttribute(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('"', '&quot;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }
  </script>
</body>
</html>
